---
- name: "Cisco IOS Hardening & Secure Management"
  hosts: cisco_devices
  gather_facts: no
  connection: network_cli

  tasks:
    - name: "Apply Security Hardening Commands"
      cisco.ios.ios_config:
        lines:
          - no ip http server
          - no ip http secure-server
          - ip ssh version 2
          - ip domain-name atlas.net
          - service password-encryption
          - line vty 0 4
          - transport input ssh
          - login authentication default
        save_when: modified

    - name: "Set Standard Banner MotD"
      cisco.ios.ios_banner:
        banner: motd
        text: |
          *******************************************************
          * WARNING: AUTHORIZED ACCESS ONLY.                    *
          * All activities are logged and monitored by Atlas.   *
          *******************************************************
        state: present
